
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員基本資料</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      position: relative;
      max-width: 800px;
      min-width: 320px;
      width: 100%;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      overflow: hidden;
    }
    .form-box {
      flex: 1 1 300px;
      z-index: 1;
    }
    .image-box {
      flex: 1 1 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .image-box img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 6px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    .logo-inline {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 50%;
    }
    h1 {
      color: #2c4975;
      white-space: nowrap;
      font-size: 24px;
      margin: 0;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }
    .form-label {
      margin-bottom: 6px;
      font-weight: bold;
      color: #2c4975;
      white-space: nowrap;
    }
    .form-input, .form-select {
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    input[type="file"] {
      padding: 6px 10px;
      background-color: #fff;
    }

    #avatarPreview img {
      margin-top: 10px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #ccc;
    }


    .gender-options {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }
    .btn-primary {
      background-color: #81d3e1;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s ease;
    }
    .btn-primary:hover {
      background-color: #2c4975;
    }
    @media screen and (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .image-box {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <div class="title-row">
        <img src="123456.jpg" alt="Logo" class="logo-inline" />
        <h1>基本資料</h1>
      </div>
      <div class="form-row">
        <label for="avatar" class="form-label">上傳大頭照</label>
        <input type="file" id="avatar" name="avatar" class="form-input" accept="image/*" />
        <div id="avatarPreview" style="margin-top: 10px;">
          <!-- 預覽圖片將顯示在這裡 -->
        </div>
      </div>      
      <form id="profileForm">
        <div class="form-row">
          <label for="name" class="form-label">姓名</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="請輸入姓名" required />
        </div>
        <div class="form-row">
          <label class="form-label">出生年月</label>
          <div style="display: flex; gap: 10px;">
            <select id="birth-year" class="form-select" required>
              <option value="">年</option>
            </select>
            <select id="birth-month" class="form-select" required>
              <option value="">月</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">性別</label>
          <div class="gender-options">
            <label><input type="radio" name="gender" value="male" required /> 男</label>
            <label><input type="radio" name="gender" value="female" required /> 女</label>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">居住地區</label>
          <div style="display: flex; gap: 10px;">
            <select id="city" class="form-select" required>
              <option value="">縣市</option>
            </select>
            <select id="district" class="form-select" required>
              <option value="">鄉鎮區</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary">儲存資料</button>
      </form>
    </div>
    <div class="image-box">
      <img src="123456.jpg" alt="illustration" />
    </div>
  </div>
  <script>
    document.getElementById("avatar").addEventListener("change", function (e) {
      const preview = document.getElementById("avatarPreview");
      const file = e.target.files[0];

      if (file && file.type.startsWith("image/")) {
        const reader = new FileReader();
        reader.onload = function (event) {
          preview.innerHTML = `<img src="${event.target.result}" alt="大頭照預覽" />`;
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = "";
      }
    });

    const currentYear = new Date().getFullYear();
    for (let y = currentYear - 100; y <= currentYear; y++) {
      const option = document.createElement("option");
      option.value = y;
      option.text = y + " 年";
      document.getElementById("birth-year").appendChild(option);
    }
    for (let m = 1; m <= 12; m++) {
      const option = document.createElement("option");
      option.value = String(m).padStart(2, '0');
      option.text = m + " 月";
      document.getElementById("birth-month").appendChild(option);

    const citySelect = document.getElementById("city");
    const districtSelect = document.getElementById("district");
    for (const city in cityDistrictData) {
      const option = document.createElement("option");
      option.value = city;
      option.text = city;
      citySelect.appendChild(option);
    }
    citySelect.addEventListener("change", function () {
      const districts = cityDistrictData[this.value] || [];
      districtSelect.innerHTML = '<option value="">鄉鎮區</option>';
      districts.forEach(d => {
        const option = document.createElement("option");
        option.value = d;
        option.text = d;
        districtSelect.appendChild(option);
      });
    });

    document.getElementById("profileForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const gender = document.querySelector('input[name="gender"]:checked')?.value;
      const year = document.getElementById("birth-year").value;
      const month = document.getElementById("birth-month").value;
      const birthday = `${year}-${month}`;
      const city = document.getElementById("city").value;
      const district = document.getElementById("district").value;
      const location = `${city} ${district}`;
      if (!name || !gender || !year || !month || !city || !district) {
        alert("請填寫所有欄位！");
        return;
      }
      console.log({ name, birthday, gender, location });
      alert("填寫完畢");
    });
    document.getElementById("profileForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const avatarFile = document.getElementById("avatar").files[0];

      const reader = new FileReader();
      reader.onloadend = function () {
        const avatarBase64 = reader.result; // base64 字串，可傳到後端儲存
        const data = {
          name: document.getElementById("name").value,
          gender: document.querySelector('input[name="gender"]:checked')?.value,
          birthday: `${document.getElementById("birth-year").value}-${document.getElementById("birth-month").value}`,
          location: `${document.getElementById("city").value} ${document.getElementById("district").value}`,
          avatar: avatarBase64
        };
      };

      if (avatarFile) {
        reader.readAsDataURL(avatarFile); // 當圖片存在時才讀取
      } else {
        reader.onloadend(); // 沒上傳圖片就直接送出
      }
    });

  </script>
</body>
</html>
